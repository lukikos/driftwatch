# driftwatch example configuration
# Copy to driftwatch.yaml and adjust to your environment.

webhook_url: "https://hooks.example.com/services/XXX/YYY/ZZZ"
interval: 60s
cooldown: 5m
max_history: 200

server:
  addr: ":8080"

checks:
  # --- Environment variable check ---
  - name: check-go-env
    type: env_var
    fields:
      var: GO_ENV
      expected: production

  # --- File hash check ---
  - name: nginx-config-hash
    type: file_hash
    fields:
      path: /etc/nginx/nginx.conf
      expected: abc123def456

  # --- File content check ---
  - name: hosts-contains-localhost
    type: file_content
    fields:
      path: /etc/hosts
      contains: "127.0.0.1"

  # --- File exists check ---
  - name: lock-file-absent
    type: file_exists
    fields:
      path: /var/run/myapp.lock
      should_exist: "false"

  # --- HTTP status check ---
  - name: api-health
    type: http_status
    fields:
      url: https://api.example.com/health
      expected: "200"

  # --- Port open check ---
  - name: postgres-port
    type: port_open
    fields:
      host: localhost
      port: "5432"

  # --- Process running check ---
  - name: nginx-running
    type: process_running
    fields:
      process: nginx

  # --- Docker container check ---
  - name: redis-container
    type: docker_container
    fields:
      container: redis
      expected: running

  # --- DNS resolve check ---
  - name: api-dns
    type: dns_resolve
    fields:
      host: api.example.com
      expected: "93.184.216.34"

  # --- SSL expiry check ---
  - name: api-ssl-expiry
    type: ssl_expiry
    fields:
      host: api.example.com:443
      min_days: "30"

  # --- System command check ---
  - name: kernel-version
    type: sys_command
    fields:
      command: uname -r
      expected: "5.15"

  # --- Directory size check ---
  - name: log-dir-size
    type: dir_size
    fields:
      path: /var/log/myapp
      max_bytes: "104857600"  # 100 MiB

  # --- Cron last run check ---
  - name: backup-cron
    type: last_cron_run
    fields:
      job_name: backup.sh
      max_age: 25h

  # --- Env file check ---
  - name: dotenv-db-url
    type: env_file
    fields:
      path: /etc/myapp/.env
      key: DATABASE_URL
      expected: "postgres://user:pass@localhost/mydb"

  # --- Kubernetes pod check ---
  - name: api-pod-running
    type: k8s_pod
    fields:
      pod_prefix: api-server
      namespace: production
      expected: Running
