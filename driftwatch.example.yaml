# driftwatch example configuration

webhook_url: "https://hooks.example.com/services/XXX/YYY/ZZZ"
interval: 60s
cooldown: 10m

checks:
  - name: check-api-key-env
    type: env_var
    fields:
      var: API_KEY
      expected: "supersecret"

  - name: check-hosts-file
    type: file_hash
    fields:
      path: /etc/hosts
      expected_hash: "abc123def456"

  - name: check-app-http
    type: http_status
    fields:
      url: "http://localhost:8080/health"
      expected: "200"

  - name: check-nginx-process
    type: process_running
    fields:
      process: nginx

  - name: check-postgres-port
    type: port_open
    fields:
      host: localhost
      port: "5432"

  - name: check-web-container
    type: docker_container
    fields:
      container: my-web-app
      expected_status: running

  - name: check-worker-container
    type: docker_container
    fields:
      container: my-worker
      expected_status: running
