# driftwatch.example.yaml — example configuration for driftwatch
# Copy to driftwatch.yaml and customise as needed.

webhook_url: "https://hooks.example.com/services/XXX/YYY/ZZZ"
interval: 60s
cooldown: 5m

checks:
  # ── Environment variable ─────────────────────────────────────────────────
  - name: app-env-check
    type: env_var
    params:
      var: APP_ENV
      expected: production

  # ── File hash ────────────────────────────────────────────────────────────
  - name: nginx-config-hash
    type: file_hash
    params:
      path: /etc/nginx/nginx.conf
      expected: sha256:abc123

  # ── File content ─────────────────────────────────────────────────────────
  - name: hosts-contains-localhost
    type: file_content
    params:
      path: /etc/hosts
      contains: "127.0.0.1"

  # ── File exists ──────────────────────────────────────────────────────────
  - name: pid-file-present
    type: file_exists
    params:
      path: /var/run/myapp.pid
      expected: true

  # ── Directory size ───────────────────────────────────────────────────────
  - name: log-dir-size
    type: dir_size
    params:
      path: /var/log/myapp
      max_bytes: 1073741824  # 1 GiB

  # ── Disk usage ───────────────────────────────────────────────────────────
  - name: root-disk-usage
    type: disk_usage
    params:
      path: /
      max_percent: 85

  # ── HTTP status ──────────────────────────────────────────────────────────
  - name: api-health
    type: http_status
    params:
      url: https://api.example.com/health
      expected: 200

  # ── HTTP latency ─────────────────────────────────────────────────────────
  - name: api-latency
    type: http_latency
    params:
      url: https://api.example.com/health
      max_ms: 500

  # ── Process running ──────────────────────────────────────────────────────
  - name: nginx-process
    type: process_running
    params:
      process: nginx

  # ── Port open ────────────────────────────────────────────────────────────
  - name: postgres-port
    type: port_open
    params:
      host: localhost
      port: 5432

  # ── DNS resolve ──────────────────────────────────────────────────────────
  - name: api-dns
    type: dns_resolve
    params:
      host: api.example.com
      expected: 93.184.216.34

  # ── SSL expiry ───────────────────────────────────────────────────────────
  - name: api-ssl-expiry
    type: ssl_expiry
    params:
      host: api.example.com:443
      min_days: 14

  # ── Certificate pin ──────────────────────────────────────────────────────
  - name: api-cert-pin
    type: cert_pin
    params:
      host: api.example.com:443
      fingerprint: "AA:BB:CC:DD:EE:FF"

  # ── Symlink ──────────────────────────────────────────────────────────────
  - name: current-release-symlink
    type: symlink
    params:
      path: /opt/myapp/current
      target: /opt/myapp/releases/42

  # ── Mount point ──────────────────────────────────────────────────────────
  - name: data-volume-mounted
    type: mount_point
    params:
      path: /mnt/data
      expected: mounted

  # ── System command ───────────────────────────────────────────────────────
  - name: kernel-version
    type: sys_command
    params:
      command: uname -r
      expected: "5.15.0-91-generic"

  # ── Cron last run ────────────────────────────────────────────────────────
  - name: backup-cron
    type: last_cron_run
    params:
      job_name: backup.sh
      max_age: 25h

  # ── Env file ─────────────────────────────────────────────────────────────
  - name: dotenv-db-host
    type: env_file
    params:
      path: /opt/myapp/.env
      key: DB_HOST
      expected: db.internal

  # ── JSON field ───────────────────────────────────────────────────────────
  - name: config-api-version
    type: json_field
    params:
      url: https://api.example.com/config
      field: version
      expected: "2"

  # ── Docker container ─────────────────────────────────────────────────────
  - name: postgres-container
    type: docker_container
    params:
      container: postgres
      expected: running

  # ── Kubernetes pod ───────────────────────────────────────────────────────
  - name: api-pod-running
    type: k8s_pod
    params:
      pod_prefix: api-deployment
      namespace: production
      expected: Running

  # ── systemd service ──────────────────────────────────────────────────────
  - name: nginx-service
    type: service_status
    params:
      service: nginx
      expected: active

  # ── AWS S3 bucket access ──────────────────────────────────────────────────
  - name: s3-assets-bucket
    type: s3_bucket_access
    params:
      url: https://s3.amazonaws.com/my-assets-bucket
      expected: 200

  # ── AWS EC2 instance metadata ─────────────────────────────────────────────
  - name: ec2-instance-type
    type: ec2_instance_metadata
    params:
      key: instance-type
      expected: t3.medium

  # ── AWS Lambda function ───────────────────────────────────────────────────
  - name: processor-lambda
    type: lambda_function
    params:
      endpoint: https://lambda.us-east-1.amazonaws.com
      function_name: my-processor
      expected_state: Active

  # ── AWS RDS instance ──────────────────────────────────────────────────────
  - name: primary-rds
    type: rds_instance_status
    params:
      endpoint: https://rds.us-east-1.amazonaws.com
      db_identifier: prod-postgres
      expected: available

  # ── AWS SQS queue attributes ──────────────────────────────────────────────
  - name: order-queue-depth
    type: sqs_queue_attributes
    params:
      endpoint: https://sqs.us-east-1.amazonaws.com
      queue_url: https://sqs.us-east-1.amazonaws.com/123456789/orders
      attribute: ApproximateNumberOfMessages
      expected: "0"

  # ── AWS IAM role policy ───────────────────────────────────────────────────
  - name: deploy-role-policy
    type: iam_role_policy
    params:
      endpoint: https://iam.amazonaws.com
      role_name: deploy-role
      expected_policy: ReadOnlyAccess

  # ── AWS Security Group rules ──────────────────────────────────────────────
  - name: web-sg-rules
    type: security_group_rules
    params:
      endpoint: https://ec2.us-east-1.amazonaws.com
      group_id: sg-0123456789abcdef0
      expected: "0.0.0.0/0:443"

  # ── AWS DynamoDB table ────────────────────────────────────────────────────
  - name: sessions-table
    type: dynamodb_table
    params:
      endpoint: https://dynamodb.us-east-1.amazonaws.com
      table_name: sessions
      expected_status: ACTIVE

  # ── AWS ECS service ───────────────────────────────────────────────────────
  - name: api-ecs-service
    type: ecs_service_status
    params:
      endpoint: https://ecs.us-east-1.amazonaws.com
      cluster: production
      service_name: api-service
      expected: ACTIVE

  # ── AWS SNS topic attributes ──────────────────────────────────────────────
  - name: alerts-topic
    type: sns_topic_attributes
    params:
      endpoint: https://sns.us-east-1.amazonaws.com
      topic_arn: arn:aws:sns:us-east-1:123456789:alerts
      attribute: DisplayName
      expected: production-alerts

  # ── AWS CloudWatch alarm ──────────────────────────────────────────────────
  - name: cpu-alarm
    type: cloudwatch_alarm
    params:
      endpoint: https://monitoring.us-east-1.amazonaws.com
      alarm_name: high-cpu
      expected: OK

  # ── AWS Route53 health check ──────────────────────────────────────────────
  - name: api-route53-health
    type: route53_health_check
    params:
      endpoint: https://route53.amazonaws.com
      health_check_id: abcd-1234-efgh-5678
      expected: Success

  # ── AWS EKS cluster status ────────────────────────────────────────────────
  - name: prod-eks-cluster
    type: eks_cluster_status
    params:
      endpoint: https://eks.us-east-1.amazonaws.com
      cluster_name: production
      expected: ACTIVE

  # ── AWS Secrets Manager secret ────────────────────────────────────────────
  - name: db-password-secret
    type: secrets_manager_secret
    params:
      endpoint: https://secretsmanager.us-east-1.amazonaws.com
      secret_id: prod/db/password
      expected_status: active

  # ── AWS ELBv2 target group health ─────────────────────────────────────────
  - name: api-target-group
    type: elbv2_target_group_health
    params:
      endpoint: https://elasticloadbalancing.us-east-1.amazonaws.com
      target_group_arn: arn:aws:elasticloadbalancing:us-east-1:123456789:targetgroup/api/abc
      expected: healthy

  # ── AWS Kinesis stream status ─────────────────────────────────────────────
  - name: events-kinesis-stream
    type: kinesis_stream_status
    params:
      endpoint: https://kinesis.us-east-1.amazonaws.com
      stream_name: events
      expected: ACTIVE

  # ── AWS Glue job status ───────────────────────────────────────────────────
  - name: etl-glue-job
    type: glue_job_status
    params:
      endpoint: https://glue.us-east-1.amazonaws.com
      job_name: my-etl-pipeline
      expected: READY
